kind = "web"
previewPath = "/"
title = "TradeBox"
version = "1.0.0"
id = "artifacts/tradebox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23076

[services.development]
run = "pnpm --filter @workspace/tradebox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradebox", "run", "build" ]
publicDir = "artifacts/tradebox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23076"
BASE_PATH = "/"
